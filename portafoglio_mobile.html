<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Portafoglio">
<meta name="theme-color" content="#080d1a">
<title>Portafoglio</title>
<!-- pako: decompressione gzip compatibile con TUTTI i browser -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#080d1a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(59,130,246,.3);border-radius:9px}
input::placeholder{color:#334155}select option{background:#111e3a;color:#e2e8f0}
@keyframes spin{to{transform:rotate(360deg)}}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
#topbar{background:linear-gradient(160deg,#0c1830,#111e3a);border-bottom:1px solid rgba(59,130,246,.2);padding:8px 12px 0;flex-shrink:0}
.top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.logo{font-size:13px;font-weight:900;color:#f1f5f9}
.source{font-size:8px;color:#475569;text-transform:uppercase;letter-spacing:.08em;margin-top:1px}
.kpis{display:flex;gap:4px}
.kpi{border-radius:6px;padding:4px 7px;text-align:center}
.kpi-v{font-size:14px;font-weight:900;line-height:1}
.kpi-l{font-size:7px;color:#475569;text-transform:uppercase;margin-top:1px}
.k-red{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3)}.v-red{color:#ef4444}
.k-grn{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3)}.v-grn{color:#10b981}
.k-blu{background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.3)}.v-blu{color:#60a5fa}
.refresh-btn{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);border-radius:6px;padding:5px 9px;color:#6ee7b7;font-size:10px;font-weight:700;cursor:pointer}
.tabs{display:flex}
.tab{flex:1;padding:7px 2px;text-align:center;font-size:9px;font-weight:700;text-transform:uppercase;color:#475569;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer}
.tab.active{color:#93c5fd;border-bottom:2px solid #3b82f6}
#content{flex:1;overflow-y:auto;padding:8px 10px;-webkit-overflow-scrolling:touch}
.sort-bar{display:flex;gap:5px;margin-bottom:8px;align-items:center}
.sort-btn{padding:5px 12px;border-radius:16px;font-size:10px;font-weight:700;border:1px solid rgba(59,130,246,.2);background:rgba(20,32,60,.9);color:#64748b;cursor:pointer}
.sort-btn.active{background:rgba(59,130,246,.3);border-color:#3b82f6;color:#93c5fd}
.sort-dir{padding:5px 10px;border-radius:16px;font-size:10px;font-weight:700;border:1px solid rgba(59,130,246,.2);background:rgba(20,32,60,.9);color:#64748b;cursor:pointer;margin-left:auto}
.card{border-radius:8px;padding:8px 10px;margin-bottom:5px;display:flex;align-items:center;gap:8px;background:rgba(20,32,60,.8);border:1px solid rgba(59,130,246,.1);border-left:3px solid #334155}
.card.arr{background:rgba(249,115,22,.08);border-color:rgba(249,115,22,.22);border-left-color:#f97316}
.card-l{flex:1;min-width:0}
.card-name{font-size:12px;font-weight:700;color:#93c5fd;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.card-sub{font-size:9px;color:#64748b;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-tags{margin-top:3px;display:flex;gap:3px;flex-wrap:wrap;align-items:center}
.card-r{flex-shrink:0;text-align:right}
.badge{font-size:7px;font-weight:700;border-radius:3px;padding:2px 4px;display:inline-block}
.arr-badge{font-size:7px;font-weight:800;color:#f97316;background:rgba(249,115,22,.2);border-radius:3px;padding:2px 5px}
.imp-badge{font-size:7px;color:#64748b;padding:2px 4px;background:rgba(255,255,255,.05);border-radius:3px}
.date-col{font-size:10px;font-weight:800;color:#94a3b8}
.pol-num{font-size:8px;color:#334155;margin-top:2px;font-family:monospace}
.search-wrap{position:relative;margin-bottom:7px}
.search-inp{width:100%;background:rgba(20,32,60,.9);border:1px solid rgba(59,130,246,.25);border-radius:8px;padding:8px 30px 8px 11px;color:#f1f5f9;font-size:13px;outline:none;font-family:inherit}
.chip-bar{display:flex;gap:4px;margin-bottom:7px;overflow-x:auto;padding-bottom:2px}
.chip{padding:4px 9px;border-radius:16px;font-size:9px;font-weight:700;background:rgba(20,32,60,.9);border:1px solid rgba(59,130,246,.15);color:#64748b;cursor:pointer;white-space:nowrap;flex-shrink:0}
.chip.active{background:rgba(59,130,246,.3);border-color:#3b82f6;color:#93c5fd}
.overlay{position:fixed;inset:0;background:#080d1a;z-index:100;display:flex;flex-direction:column}
.ov-hdr{background:linear-gradient(160deg,#0c1830,#111e3a);border-bottom:1px solid rgba(59,130,246,.2);padding:10px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.ov-title{font-size:13px;font-weight:800;color:#f1f5f9;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ov-body{flex:1;overflow-y:auto;padding:10px 12px;-webkit-overflow-scrolling:touch}
.pol-card{background:rgba(20,32,60,.8);border:1px solid rgba(59,130,246,.1);border-radius:8px;padding:10px;margin-bottom:8px}
.pol-card.arr{border-left:3px solid #f97316;background:rgba(249,115,22,.07)}
.pol-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:6px}
.pol-cell{background:rgba(10,15,26,.4);border-radius:5px;padding:5px 7px}
.pol-lbl{font-size:7px;color:#475569;text-transform:uppercase;margin-bottom:1px}
.pol-val{font-size:10px;font-weight:600;color:#e2e8f0;word-break:break-all}
.note-box{background:rgba(234,179,8,.07);border:1px solid rgba(234,179,8,.2);border-radius:6px;padding:6px 8px;margin-top:6px}
.note-lbl{font-size:7px;color:#ca8a04;text-transform:uppercase;margin-bottom:1px}
.note-val{font-size:10px;color:#fde047}
.edit-ov{position:fixed;inset:0;background:rgba(5,8,18,.98);z-index:200;display:flex;flex-direction:column}
.edit-group{margin-bottom:11px}
.edit-lbl{font-size:9px;color:#64748b;text-transform:uppercase;margin-bottom:4px;font-weight:700;display:block}
.edit-inp,.edit-sel,.edit-txt{width:100%;background:rgba(20,32,60,.9);border:1px solid rgba(59,130,246,.3);border-radius:7px;padding:9px 11px;color:#f1f5f9;font-size:14px;outline:none;font-family:inherit}
.edit-txt{resize:vertical;min-height:56px}
.edit-info{font-size:9px;color:#6ee7b7;padding:6px 9px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:6px;margin-bottom:11px}
.tot-grand{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:10px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.tot-box{background:rgba(20,32,60,.8);border:1px solid rgba(59,130,246,.1);border-radius:8px;padding:9px 11px;margin-bottom:8px}
.tot-hdr{font-size:8px;color:#475569;text-transform:uppercase;margin-bottom:5px;font-weight:700}
.tot-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(59,130,246,.06)}
.tot-row:last-child{border-bottom:none}
.tot-lbl{font-size:10px;color:#94a3b8}.tot-val{font-size:10px;font-weight:800;color:#60a5fa}
.btn-p{background:linear-gradient(135deg,#1d4ed8,#2563eb);border:none;border-radius:7px;padding:8px 13px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0}
.btn-s{background:rgba(20,32,60,.9);border:1px solid rgba(59,130,246,.3);border-radius:7px;padding:8px 12px;color:#93c5fd;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0}
.btn-g{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);border-radius:7px;padding:8px 12px;color:#6ee7b7;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0}
.saving-ov{position:fixed;inset:0;background:rgba(5,8,18,.7);z-index:500;display:flex;align-items:center;justify-content:center}
.saving-box{background:#111e3a;border:1px solid rgba(59,130,246,.3);border-radius:11px;padding:20px 26px;text-align:center}
.spinner{width:30px;height:30px;border:3px solid rgba(59,130,246,.2);border-top-color:#3b82f6;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 9px}
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);padding:8px 16px;border-radius:8px;font-weight:700;z-index:999;font-size:12px;white-space:nowrap;display:none}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:11px}
.sec-label{font-size:8px;color:#475569;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;font-weight:700}
.empty{text-align:center;padding:32px 16px;color:#475569;font-size:12px}
</style>
</head>
<body>
<div id="loading">
  <div class="spinner"></div>
  <div style="font-size:11px;color:#475569">Caricamento…</div>
</div>
<div id="app" style="display:none">
  <div id="topbar">
    <div class="top-row">
      <div><div class="logo">🛡 Portafoglio</div><div class="source" id="src-lbl">…</div></div>
      <div style="display:flex;gap:5px;align-items:center">
        <div class="kpis">
          <div class="kpi k-red"><div class="kpi-v v-red" id="k-arr">0</div><div class="kpi-l">ARR</div></div>
          <div class="kpi k-grn"><div class="kpi-v v-grn" id="k-att">0</div><div class="kpi-l">Attive</div></div>
          <div class="kpi k-blu"><div class="kpi-v v-blu" id="k-tot">0</div><div class="kpi-l">Tot</div></div>
        </div>
        <button class="refresh-btn" onclick="doRefresh()">↻</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" id="tab-lista" onclick="setTab('lista')">📋 Lista</button>
      <button class="tab" id="tab-arr" onclick="setTab('arr')">🔴 ARR</button>
      <button class="tab" id="tab-cerca" onclick="setTab('cerca')">🔍 Cerca</button>
      <button class="tab" id="tab-tot" onclick="setTab('tot')">📊 Tot</button>
    </div>
  </div>
  <div id="content"></div>
</div>
<div class="overlay" id="cli-ov" style="display:none">
  <div class="ov-hdr">
    <button class="btn-s" onclick="closeCli()">← Torna</button>
    <div class="ov-title" id="cli-title"></div>
  </div>
  <div class="ov-body" id="cli-body"></div>
</div>
<div class="edit-ov" id="edit-ov" style="display:none">
  <div class="ov-hdr">
    <button class="btn-s" onclick="closeEdit()">✕</button>
    <div class="ov-title" id="edit-title"></div>
    <button class="btn-g" onclick="saveEdit()">💾 Salva</button>
  </div>
  <div class="ov-body" id="edit-body"></div>
</div>
<div class="saving-ov" id="saving-ov" style="display:none">
  <div class="saving-box"><div class="spinner"></div><div style="font-size:11px;color:#93c5fd;font-weight:700">Salvataggio…</div></div>
</div>
<div id="toast"></div>

function dateVal(s){
  if(!s||s==="\"||s==="/")return Infinity;
  const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m)return new Date(parseInt(m[3]),parseInt(m[2])-1,parseInt(m[1])).getTime();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return new Date(s).getTime();
  return Infinity;
}
function fmtShort(s){
  if(!s||s==="\"||s==="/")return"—";
  const m=s.match(/^(\d{1,2})\/(\d{1,2})\//);
  if(m)return m[1].padStart(2,"0")+"/"+m[2].padStart(2,"0");
  if(s.length>=10&&s[4]==="-")return s.slice(8,10)+"/"+s.slice(5,7);
  return s.slice(0,5)||"—";
}

// Decompressione con pako (compatibile con tutti i browser)
function loadFallback(){
  try{
    const bin=atob(DATA_B64);
    const bytes=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
    const decompressed=pako.inflate(bytes,{to:"string"});
    return JSON.parse(decompressed);
  }catch(e){
    console.error("Fallback error:",e);
    return [];
  }
}

function parseCSV(text){
  const lines=text.trim().split("\n");
  if(lines.length<2)return[];
  return lines.slice(1).map((line,idx)=>{
    const cols=[];let cur="",inQ=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'&&line[i+1]==='"'){cur+='"';i++;}
      else if(line[i]==='"'){ inQ=!inQ;}
      else if(line[i]===','&&!inQ){cols.push(cur.trim());cur="";}
      else cur+=line[i];
    }
    cols.push(cur.trim());
    const r={id:idx+2};
    CSV_COLS.forEach((k,i)=>{r[k]=(cols[i]||"").replace(/^"|"$/g,"").trim();});
    r.importo=r.importo?parseFloat(r.importo.replace(",","."))||null:null;
    return r;
  }).filter(r=>r.contraente&&r.contraente.trim()&&r.contraente!=="\\"&&r.contraente!=="\\\\");
}

let records=[],curTab="lista",searchQ="",filtriSett=[],filtriStato=[],sortField="todo",sortDir="asc",curEditId=null;

function loadData(){
  // Carica subito da fallback locale — nessuna attesa
  const data=loadFallback();
  records=data;
  document.getElementById("src-lbl").textContent="○ Locale · "+data.length+" righe (tocca ↻ per aggiornare)";
  finish();
}

function finish(){
  document.getElementById("loading").style.display="none";
  document.getElementById("app").style.display="flex";
  updateKPIs();renderTab();
}

async function doRefresh(){
  document.getElementById("src-lbl").textContent="↻ Connessione a Sheets…";
  try{
    const controller=new AbortController();
    const t=setTimeout(()=>controller.abort(),10000);
    const res=await fetch(CSV_URL,{cache:"no-cache",signal:controller.signal});
    clearTimeout(t);
    if(!res.ok)throw new Error("HTTP "+res.status);
    const data=parseCSV(await res.text());
    if(data.length===0)throw new Error("Vuoto");
    records=data;
    document.getElementById("src-lbl").textContent="● Sheets · "+data.length+" righe";
    updateKPIs();renderTab();
    showToast("✅ Aggiornato da Sheets");
  }catch(e){
    showToast("⚠ Sheets non raggiungibile");
    document.getElementById("src-lbl").textContent="○ Locale · "+records.length+" righe";
  }
}

function updateKPIs(){
  document.getElementById("k-arr").textContent=records.filter(r=>isArr(r)).length;
  document.getElementById("k-att").textContent=records.filter(r=>r.stato==="ATTIVA").length;
  document.getElementById("k-tot").textContent=records.length;
}
function setTab(t){curTab=t;document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));document.getElementById("tab-"+t).classList.add("active");document.getElementById("content").innerHTML="";renderTab();}
function renderTab(){if(curTab==="lista")renderLista();else if(curTab==="arr")renderArr();else if(curTab==="cerca")renderCerca();else renderTot();}

function cardHtml(r){
  const arr=isArr(r);
  const arrB=arr?'<span class="arr-badge">ARR</span> ':"";
  const statoB=`<span class="badge" style="color:${sCol(r.stato)};background:${sCol(r.stato)}22">${esc(r.stato||"—")}</span>`;
  const imp=r.importo?`<span class="imp-badge">€${parseFloat(r.importo).toLocaleString("it-IT")}</span>`:"";
  const sub=[r.settore,r.targa].filter(Boolean).join(" · ");
  const dateD=sortField==="scad"?fmtShort(r.scad):fmtShort(r.todo);
  const pol=r.polizza?`<div class="pol-num">${String(r.polizza).slice(-6)}</div>`:"";
  return `<div class="card${arr?" arr":""}"><div class="card-l"><div class="card-name" onclick="openCli('${esc(r.contraente)}')">${arrB}${esc(r.contraente||"—")}</div><div class="card-sub">${esc(sub)}</div><div class="card-tags">${statoB}${imp}</div></div><div class="card-r"><div class="date-col">${dateD}</div>${pol}</div></div>`;
}

function renderLista(){
  const campo=sortField==="scad"?"scad":"todo";
  const lista=[...records].sort((a,b)=>{const va=dateVal(a[campo]),vb=dateVal(b[campo]);if(va===Infinity&&vb===Infinity)return(a.contraente||"").localeCompare(b.contraente||"");if(va===Infinity)return 1;if(vb===Infinity)return-1;return sortDir==="asc"?va-vb:vb-va;});
  let html=`<div class="sort-bar"><span class="sort-btn${sortField==="todo"?" active":""}" onclick="setSortField('todo')">TO-DO</span><span class="sort-btn${sortField==="scad"?" active":""}" onclick="setSortField('scad')">SCAD</span><span class="sort-dir" onclick="toggleDir()">${sortDir==="asc"?"↑ Vecchie":"↓ Recenti"}</span></div>`;
  html+=`<div class="sec-label">${lista.length} righe</div>`;
  html+=lista.map(r=>cardHtml(r)).join("");
  document.getElementById("content").innerHTML=html;
}
function setSortField(f){sortField=f;renderLista();}
function toggleDir(){sortDir=sortDir==="asc"?"desc":"asc";renderLista();}

function renderArr(){
  const lista=[...records].filter(r=>isArr(r)).sort((a,b)=>dateVal(a.todo)-dateVal(b.todo));
  document.getElementById("content").innerHTML=`<div class="sec-label">🔴 ${lista.length} arretrati</div>`+(lista.length===0?`<div class="empty">✅ Nessun arretrato</div>`:lista.map(r=>cardHtml(r)).join(""));
}

function renderCerca(){
  const el=document.getElementById("content");
  if(!document.getElementById("search-inp")){
    el.innerHTML=`<div class="search-wrap"><input class="search-inp" id="search-inp" placeholder="Contraente, targa, polizza…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"><span style="position:absolute;right:10px;top:50%;transform:translateY(-50%);color:#475569">🔍</span></div><div class="sec-label" style="margin-bottom:3px">Settore</div><div class="chip-bar" id="chips-sett"></div><div class="sec-label" style="margin-bottom:3px">Stato</div><div class="chip-bar" id="chips-stato"></div><div id="cerca-ris"></div>`;
    document.getElementById("search-inp").addEventListener("input",function(){searchQ=this.value;renderCercaRis();});
    renderCercaChips();document.getElementById("search-inp").focus();
  }
  renderCercaRis();
}
function renderCercaChips(){
  const cs=document.getElementById("chips-sett");if(cs)cs.innerHTML=SETTORI.map(s=>`<span class="chip${filtriSett.includes(s)?" active":""}" onclick="togSett('${s}')">${s}</span>`).join("");
  const cst=document.getElementById("chips-stato");if(cst)cst.innerHTML=STATI.map(s=>`<span class="chip${filtriStato.includes(s)?" active":""}" onclick="togStat('${s}')">${s}</span>`).join("");
}
function togSett(v){filtriSett=filtriSett.includes(v)?filtriSett.filter(x=>x!==v):[...filtriSett,v];renderCercaChips();renderCercaRis();}
function togStat(v){filtriStato=filtriStato.includes(v)?filtriStato.filter(x=>x!==v):[...filtriStato,v];renderCercaChips();renderCercaRis();}
function renderCercaRis(){
  const ris=document.getElementById("cerca-ris");if(!ris)return;
  const q=searchQ;let res=[...records];
  if(q){const t=q.toLowerCase();res=res.filter(r=>(r.contraente||"").toLowerCase().includes(t)||(r.polizza||"").toLowerCase().includes(t)||(r.targa||"").toLowerCase().includes(t)||(r.cf||"").toLowerCase().includes(t)||(r.nota1||"").toLowerCase().includes(t));}
  if(filtriSett.length>0)res=res.filter(r=>filtriSett.includes(r.settore));
  if(filtriStato.length>0)res=res.filter(r=>filtriStato.includes(r.stato));
  if(!q&&!filtriSett.length&&!filtriStato.length){ris.innerHTML=`<div class="empty">👆 Scrivi o seleziona filtri</div>`;return;}
  res.sort((a,b)=>dateVal(a.todo)-dateVal(b.todo));
  ris.innerHTML=`<div class="sec-label">${res.length} risultati</div>`+(res.length===0?`<div class="empty">🔍 Nessun risultato</div>`:res.map(r=>cardHtml(r)).join(""));
}

function renderTot(){
  const attive=records.filter(r=>!isArr(r));
  const tot=attive.reduce((s,r)=>s+(parseFloat(r.importo)||0),0);
  const bySett={},byRamo={};
  attive.forEach(r=>{const s=r.settore||"N/D";if(!bySett[s])bySett[s]=0;bySett[s]+=(parseFloat(r.importo)||0);const rm=r.ramo||"N/D";if(!byRamo[rm])byRamo[rm]=0;byRamo[rm]+=(parseFloat(r.importo)||0);});
  const sOrd=Object.entries(bySett).sort(([,a],[,b])=>b-a).filter(([,v])=>v>0);
  const rOrd=Object.entries(byRamo).sort(([,a],[,b])=>b-a).filter(([,v])=>v>0);
  document.getElementById("content").innerHTML=`<div class="tot-grand"><div><div style="font-size:9px;color:#64748b;font-weight:700;text-transform:uppercase">Totale</div><div style="font-size:8px;color:#475569">${attive.length} polizze</div></div><div style="font-size:16px;font-weight:900;color:#60a5fa">${fmtEur(tot)}</div></div><div class="tot-box"><div class="tot-hdr">Per settore</div>${sOrd.map(([s,v])=>`<div class="tot-row"><span class="tot-lbl">${esc(s)}</span><span class="tot-val">${fmtEur(v)}</span></div>`).join("")}</div><div class="tot-box"><div class="tot-hdr">Per ramo</div>${rOrd.map(([s,v])=>`<div class="tot-row"><span class="tot-lbl">${esc(s)}</span><span class="tot-val">${fmtEur(v)}</span></div>`).join("")}</div>`;
}

function openCli(nome){
  const righe=[...records].filter(r=>r.contraente===nome).sort((a,b)=>(isArr(b)?1:0)-(isArr(a)?1:0)||dateVal(a.todo)-dateVal(b.todo));
  document.getElementById("cli-title").textContent="👤 "+nome;
  let html=`<div class="sec-label">${righe.length} righe</div>`;
  righe.forEach(r=>{
    const arr=isArr(r);
    const campi=[["TO-DO",r.todo||"—"],["Scadenza",r.scad||"—"],["Settore",r.settore],["Ramo",r.ramo],["Polizza",r.polizza],["Importo",fmtEur(r.importo)],["Stato",r.stato],["Targa",r.targa],["Rinnovo",r.rinn],["Fraz.",r.fr]].filter(([,v])=>v&&v!=="—");
    html+=`<div class="pol-card${arr?" arr":""}"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><div style="display:flex;gap:5px;align-items:center">${arr?'<span class="arr-badge">ARR</span>':""}<span class="badge" style="color:${sCol(r.stato)};background:${sCol(r.stato)}22;font-size:8px;padding:2px 6px">${esc(r.stato||"—")}</span>${r.settore?`<span style="font-size:8px;color:#64748b">${esc(r.settore)}</span>`:""}</div><button class="btn-p" style="padding:4px 8px;font-size:9px" onclick="openEdit(${r.id})">✏️</button></div><div class="pol-grid">${campi.map(([l,v])=>`<div class="pol-cell"><div class="pol-lbl">${l}</div><div class="pol-val">${esc(v||"—")}</div></div>`).join("")}</div>${r.nota1?`<div class="note-box"><div class="note-lbl">Nota 1</div><div class="note-val">${esc(r.nota1)}</div></div>`:""}${r.nota2?`<div class="note-box"><div class="note-lbl">Nota 2</div><div class="note-val">${esc(r.nota2)}</div></div>`:""}</div>`;
  });
  document.getElementById("cli-body").innerHTML=html;
  document.getElementById("cli-ov").style.display="flex";
}
function closeCli(){document.getElementById("cli-ov").style.display="none";}

function openEdit(id){
  const r=records.find(x=>x.id===id);if(!r)return;
  curEditId=id;document.getElementById("edit-title").textContent=r.contraente;
  let html=`<div class="edit-info">✅ Modifica su Google Sheets</div>`;
  CAMPI_EDIT.forEach(({key,label,type,opts,ph})=>{
    const val=r[key]||"";
    html+=`<div class="edit-group"><label class="edit-lbl">${label}</label>`;
    if(type==="select")html+=`<select class="edit-sel" id="ef-${key}"><option value=""></option>${opts.map(o=>`<option value="${esc(o)}"${o===val?" selected":""}>${esc(o)||"—"}</option>`).join("")}</select>`;
    else if(type==="textarea")html+=`<textarea class="edit-txt" id="ef-${key}">${esc(val)}</textarea>`;
    else if(type==="number")html+=`<input type="number" step="0.01" class="edit-inp" id="ef-${key}" value="${val}">`;
    else html+=`<input type="text" class="edit-inp" id="ef-${key}" value="${esc(val)}" placeholder="${ph||""}">`;
    html+="</div>";
  });
  document.getElementById("edit-body").innerHTML=html;
  document.getElementById("edit-ov").style.display="flex";
}
function closeEdit(){document.getElementById("edit-ov").style.display="none";curEditId=null;}
async function saveEdit(){
  const r=records.find(x=>x.id===curEditId);if(!r)return;
  const campi={};
  CAMPI_EDIT.forEach(({key})=>{const el=document.getElementById("ef-"+key);if(!el)return;const nv=el.value.trim(),ov=String(r[key]||"").trim();if(nv!==ov&&COL_MAP[key])campi[COL_MAP[key]]=nv;});
  if(Object.keys(campi).length===0){showToast("Nessuna modifica");closeEdit();return;}
  closeEdit();closeCli();
  document.getElementById("saving-ov").style.display="flex";
  try{
    await fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify({row:curEditId,campi:campi})});
    document.getElementById("saving-ov").style.display="none";showToast("✅ Salvato!");setTimeout(()=>doRefresh(),1500);
  }catch(e){document.getElementById("saving-ov").style.display="none";showToast("❌ Errore");}
}
let toastT;
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.style.display="block";t.style.background=msg.includes("❌")?"#7f1d1d":"#065f46";t.style.border=msg.includes("❌")?"1px solid #ef4444":"1px solid #10b981";clearTimeout(toastT);toastT=setTimeout(()=>t.style.display="none",3000);}

// Carica subito — pako è già disponibile
loadData();
</script>
</body>
