<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Portafoglio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0a0f1e;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;overflow:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(99,102,241,.3);border-radius:9px}
input::placeholder{color:#334155}select option{background:#111827;color:#e2e8f0}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
#topbar{background:linear-gradient(180deg,#111827,#0f172a);border-bottom:1px solid rgba(99,102,241,.15);padding:10px 14px 0;flex-shrink:0}
.top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.logo{font-size:15px;font-weight:800;color:#f1f5f9;letter-spacing:-.3px}
.src-lbl{font-size:9px;color:#475569;text-transform:uppercase;margin-top:1px}
.kpis{display:flex;gap:5px}
.kpi{border-radius:8px;padding:5px 10px;text-align:center}
.kpi-v{font-size:16px;font-weight:900;line-height:1}
.kpi-l{font-size:8px;color:#475569;text-transform:uppercase;margin-top:1px}
.k-red{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25)}.v-red{color:#ef4444}
.k-grn{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25)}.v-grn{color:#10b981}
.k-blu{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.25)}.v-blu{color:#818cf8}
.refresh-btn{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);border-radius:8px;padding:7px 13px;color:#6ee7b7;font-size:13px;cursor:pointer}
.tabs{display:flex}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:11px;font-weight:700;text-transform:uppercase;color:#475569;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;letter-spacing:.05em}
.tab.active{color:#818cf8;border-bottom:2px solid #6366f1}
.new-btn{background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);border-radius:7px;padding:6px 12px;color:#818cf8;font-size:16px;font-weight:900;cursor:pointer;flex-shrink:0;margin-left:6px;margin-bottom:2px}
#content{flex:1;overflow-y:auto;padding:8px 10px;-webkit-overflow-scrolling:touch}
.card{border-radius:10px;padding:11px 12px;margin-bottom:7px;display:flex;align-items:center;gap:8px;animation:fadeIn .15s ease}

.card-name{font-size:14px;font-weight:800;color:#f1f5f9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.card-sub{font-size:11px;color:#6366f1;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
.card-tags{margin-top:5px;display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.card-r{flex-shrink:0;text-align:right}
.date-lbl{font-size:8px;color:#64748b;text-transform:uppercase;font-weight:700;margin-bottom:1px}
.date-val{font-size:13px;font-weight:900;letter-spacing:.02em}
.btns-row{margin-top:6px;display:flex;gap:7px;justify-content:flex-end}
.icon-btn{border-radius:7px;padding:5px 7px;font-size:13px;cursor:pointer;line-height:1;border:1px solid}
.del-btn{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.25);color:#fca5a5}
.edit-btn{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.25);color:#a5b4fc}
.badge{font-size:10px;font-weight:800;border-radius:5px;padding:2px 7px;display:inline-block;color:#fff}
.search-wrap{position:relative;margin-bottom:8px}
.search-inp{width:100%;background:rgba(15,23,42,.9);border:1px solid rgba(99,102,241,.2);border-radius:9px;padding:9px 12px;color:#f1f5f9;font-size:14px;outline:none;font-family:inherit}
.search-inp:focus{border-color:rgba(99,102,241,.5)}
.chip-bar{display:flex;gap:4px;margin-bottom:6px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.chip{padding:5px 10px;border-radius:14px;font-size:10px;font-weight:700;background:rgba(15,23,42,.9);border:1px solid rgba(99,102,241,.15);color:#64748b;cursor:pointer;white-space:nowrap;flex-shrink:0}
.chip.on{background:rgba(99,102,241,.2);border-color:#6366f1;color:#a5b4fc}
.overlay{position:fixed;inset:0;background:#0a0f1e;z-index:100;display:flex;flex-direction:column}
.ov-hdr{background:linear-gradient(180deg,#111827,#0f172a);border-bottom:1px solid rgba(99,102,241,.15);padding:12px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.ov-title{font-size:14px;font-weight:800;color:#f1f5f9;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ov-body{flex:1;overflow-y:auto;padding:12px 14px;-webkit-overflow-scrolling:touch}
.fld{margin-bottom:10px}
.fld label{font-size:8px;color:#64748b;text-transform:uppercase;letter-spacing:.08em;font-weight:700;display:block;margin-bottom:4px}
.fld input,.fld select,.fld textarea{width:100%;background:rgba(15,23,42,.9);border:1px solid rgba(99,102,241,.25);border-radius:8px;padding:9px 11px;color:#f1f5f9;font-size:13px;outline:none;font-family:inherit}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:#6366f1}
.fld textarea{resize:vertical;min-height:60px}
.date-row{display:flex;gap:6px;align-items:center}
.date-row input{flex:1}
.cal-btn{background:rgba(234,179,8,.12);border:1px solid rgba(234,179,8,.3);border-radius:8px;padding:9px 11px;color:#fde047;font-size:13px;cursor:pointer;flex-shrink:0;font-weight:700}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.form-grid .wide{grid-column:1/-1}
.btn-back{background:rgba(15,23,42,.9);border:1px solid rgba(99,102,241,.25);border-radius:8px;padding:8px 13px;color:#818cf8;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}
.btn-save{background:linear-gradient(135deg,#4f46e5,#6366f1);border:none;border-radius:8px;padding:8px 16px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}
.btn-danger{background:rgba(239,68,68,.8);border:none;border-radius:8px;padding:9px 18px;color:#fff;font-size:12px;font-weight:700;cursor:pointer}
.confirm-box{position:fixed;inset:0;background:rgba(5,8,18,.9);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px}
.confirm-inner{background:#111827;border:1px solid rgba(239,68,68,.3);border-radius:14px;padding:22px;max-width:320px;width:100%;text-align:center}
.sort-bar{display:flex;gap:5px;margin-bottom:8px;align-items:center}
.sort-btn{padding:6px 13px;border-radius:14px;font-size:11px;font-weight:700;border:1px solid rgba(99,102,241,.2);background:rgba(15,23,42,.9);color:#64748b;cursor:pointer}
.sort-btn.on{background:rgba(99,102,241,.25);border-color:#6366f1;color:#a5b4fc}
.sort-dir{padding:6px 12px;border-radius:14px;font-size:11px;font-weight:700;border:1px solid rgba(99,102,241,.2);background:rgba(15,23,42,.9);color:#64748b;cursor:pointer;margin-left:auto}
.tot-card{background:rgba(15,23,42,.95);border:1px solid rgba(99,102,241,.12);border-radius:10px;padding:11px 13px;margin-bottom:7px}
.tot-hdr{font-size:9px;color:#475569;text-transform:uppercase;font-weight:700;margin-bottom:6px;letter-spacing:.08em}
.tot-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(99,102,241,.06);font-size:11px}
.tot-row:last-child{border-bottom:none}
.tot-footer{display:flex;justify-content:space-between;padding:6px 0;font-size:12px;font-weight:800;color:#818cf8;border-top:1px solid rgba(99,102,241,.15);margin-top:4px}
.sec-lbl{font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:7px}
.empty{text-align:center;padding:40px 16px;color:#475569;font-size:12px}
.spinner{width:32px;height:32px;border:3px solid rgba(99,102,241,.2);border-top-color:#6366f1;border-radius:50%;animation:spin .9s linear infinite;margin:0 auto 12px}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:12px;padding:20px}
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);padding:9px 18px;border-radius:9px;font-weight:700;font-size:12px;display:none;z-index:999;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;color:#fff}
</style>
</head>
<body>
<div id="loading">
  <div class="spinner"></div>
  <div style="font-size:12px;color:#64748b;text-align:center">Connessione a Google Sheets…</div>
  <button onclick="location.reload()" id="retry-btn" style="display:none;background:rgba(99,102,241,.2);border:1px solid rgba(99,102,241,.3);border-radius:8px;padding:8px 16px;color:#818cf8;font-size:11px;font-weight:700;cursor:pointer;margin-top:8px">↻ Riprova</button>
</div>
<div id="app" style="display:none">
  <div id="topbar">
    <div class="top-row">
      <div><div class="logo">🛡 Portafoglio</div><div class="src-lbl" id="src-lbl">…</div></div>
      <div style="display:flex;gap:6px;align-items:center">
        <div class="kpis">
          <div class="kpi k-red"><div class="kpi-v v-red" id="k-arr">0</div><div class="kpi-l">Arr</div></div>
          <div class="kpi k-grn"><div class="kpi-v v-grn" id="k-att">0</div><div class="kpi-l">Att</div></div>
          <div class="kpi k-blu"><div class="kpi-v v-blu" id="k-tot">0</div><div class="kpi-l">Tot</div></div>
        </div>
        <button class="refresh-btn" onclick="doRefresh()">↻</button>
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div class="tabs" style="flex:1">
        <button class="tab active" id="tab-lista" onclick="setTab('lista')">📋 Lista</button>
        <button class="tab" id="tab-arr" onclick="setTab('arr')">🔴 Arr</button>
        <button class="tab" id="tab-cerca" onclick="setTab('cerca')">🔍 Cerca</button>
        <button class="tab" id="tab-tot" onclick="setTab('tot')">📊 Tot</button>
      </div>
      <button class="new-btn" onclick="openNuova()">＋</button>
    </div>
  </div>
  <div id="content"></div>
</div>

<!-- SCHEDA CLIENTE -->
<div class="overlay" id="cli-ov" style="display:none">
  <div class="ov-hdr">
    <button class="btn-back" onclick="closeCli()">← Torna</button>
    <div class="ov-title" id="cli-title"></div>
  </div>
  <div class="ov-body" id="cli-body"></div>
</div>

<!-- MODIFICA -->
<div class="overlay" id="edit-ov" style="display:none;z-index:200">
  <div class="ov-hdr">
    <button class="btn-back" onclick="closeEdit()">✕</button>
    <div class="ov-title" id="edit-title">Modifica</div>
    <button class="btn-save" onclick="saveEdit()">💾 Salva</button>
  </div>
  <div class="ov-body" id="edit-body"></div>
</div>

<!-- NUOVA RIGA -->
<div class="overlay" id="nuova-ov" style="display:none;z-index:200">
  <div class="ov-hdr">
    <button class="btn-back" onclick="closeNuova()">✕</button>
    <div class="ov-title">➕ Nuova riga</div>
    <button class="btn-save" onclick="saveNuova()">💾 Inserisci</button>
  </div>
  <div class="ov-body" id="nuova-body"></div>
</div>

<!-- CONFERMA ELIMINA -->
<div class="confirm-box" id="confirm-box" style="display:none">
  <div class="confirm-inner">
    <div style="font-size:22px;margin-bottom:10px">🗑</div>
    <div style="font-size:13px;font-weight:700;color:#f1f5f9;margin-bottom:6px" id="confirm-txt">Eliminare?</div>
    <div style="font-size:10px;color:#64748b;margin-bottom:18px">Operazione non reversibile.</div>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn-danger" onclick="confirmDel()">Sì, elimina</button>
      <button class="btn-back" onclick="cancelDel()">Annulla</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const CSV_URL="https://docs.google.com/spreadsheets/d/1eptc1n6yyUfgKrqpppQtuYn7VDCE5CddSMHKf1Sj6hs/export?format=csv&gid=59454588";
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbzCeGfHs9fLXgwn0nTxX_28ncuJSKDjzqz0lpLahbdflGlo0K7uJDJUy4t-J1zuy7k26w/exec";
const CSV_COLS=["contraente","ramo","polizza","scad","todo","importo","rinn","fr","settore","stato","targa","settori","nota1","nota2","capo","rami","indirizzo","citta","cell","email","tipolCli","sub","cf"];
const COL_MAP={contraente:1,ramo:2,polizza:3,scad:4,todo:5,importo:6,rinn:7,fr:8,settore:9,stato:10,targa:11,settori:12,nota1:13,nota2:14,capo:15,rami:16,indirizzo:17,citta:18,cell:19,email:20,tipolCli:21,sub:22,cf:23};
const STATI=["ATTIVA","PROSPETTIVA","OPPORTUNITA'","RECUPERO","ARRETRATO","SOSPESA","DOCUMENTI","LISTE","PREV RCA URG","BPER","SENZA SPER","SINISTRO","SCAD","RIFORMA","BDA","CAT NAT","TELEFONARE","PASSARE","RISCONTRO","APPUNTAMENTO","EMAIL","PREVENTIVO"];
const SETTORI=["RCA","INFORTUNI","RCG","RDP","RDO","RGG","FURTO","FUR","ARRETRATO","SCREENING","#SALUTE","IRO","IMP","INC","INF","VITA","VITA INDIVIDUALI","VITA-FONDI","TCM","CASA","CAT NAT","CAUZIONI","CAUZIONE","TRASPORTI","FAMIGLIA","DOC","MAL","MALATTIE","CVT","TOP","VARI","PROVV"];
const STATO_COL={ATTIVA:"#10b981",PROSPETTIVA:"#a78bfa",RECUPERO:"#f59e0b",ARRETRATO:"#f97316",SOSPESA:"#6b7280",DOCUMENTI:"#06b6d4",BDA:"#8b5cf6",TELEFONARE:"#0d9488",PASSARE:"#0891b2",RISCONTRO:"#7c3aed",APPUNTAMENTO:"#ca8a04",EMAIL:"#2563eb",PREVENTIVO:"#9d6d2e"};
const AGENDA=new Set(["TELEFONARE","PASSARE","RISCONTRO","APPUNTAMENTO","EMAIL","PREVENTIVO"]);
const AGENDA_EMO={TELEFONARE:"📞",PASSARE:"🚶",RISCONTRO:"🔄",APPUNTAMENTO:"📅",EMAIL:"✉️",PREVENTIVO:"📋"};

let records=[],curTab="lista",sortField="todo",sortDir="asc";
let searchQ="",filtriStato=[],filtriRamo=[];
let curEditId=null,pendDelId=null,toastT;

const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const sCol=s=>STATO_COL[s]||"#6b7280";
const isArr=r=>(r.stato||"").toUpperCase()==="ARRETRATO";
const isAg=r=>AGENDA.has((r.stato||"").toUpperCase());
const fmtEur=v=>v!=null&&v!==""?"€"+parseFloat(v).toLocaleString("it-IT",{minimumFractionDigits:2}):"—";

// ── DATE ──────────────────────────────────────────────────────────────────────
// Accetta DD/MM/YYYY o YYYY-MM-DD → Date
function parseDate(s){
  if(!s||typeof s!=="string")return null;
  s=s.trim();
  let m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m){const d=new Date(+m[3],+m[2]-1,+m[1]);return isNaN(d.getTime())?null:d;}
  m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m){const d=new Date(+m[1],+m[2]-1,+m[3]);return isNaN(d.getTime())?null:d;}
  return null;
}
// Date → DD/MM/YYYY
function toDMY(d){if(!d)return"";return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear();}
// stringa → YYYY-MM-DD
function toISO(s){const d=parseDate(s);if(!d)return"";return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
// YYYY-MM-DD → DD/MM/YYYY
function isoToDMY(iso){if(!iso||!iso.match(/^\d{4}-\d{2}-\d{2}$/))return iso||"";const[y,m,d]=iso.split("-");return d+"/"+m+"/"+y;}

function dVal(s){const d=parseDate(s);return d?d.getTime():Infinity;}
function fmtShort(s){const d=parseDate(s);if(!d)return"—";return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0");}
function fmtFull(s){const d=parseDate(s);if(!d)return s||"—";return toDMY(d);}

function badge(stato){const c=sCol(stato);return`<span class="badge" style="background:${c}">${esc(stato||"—")}</span>`;}

function scadAlert(r){
  const d=parseDate(r.scad);if(!d)return"";
  const oggi=new Date();oggi.setHours(0,0,0,0);d.setHours(0,0,0,0);
  const diff=Math.floor((oggi-d)/86400000);
  if(diff<-30)return"";
  if(diff<0)return`<span style="font-size:10px;color:${diff>-8?"#fbbf24":"#34d399"};font-weight:700;margin-left:4px">⏳${Math.abs(diff)}g</span>`;
  if(diff===0)return`<span style="font-size:10px;color:#fbbf24;font-weight:900;margin-left:4px">⚠️OGGI</span>`;
  return`<span style="font-size:10px;color:#f97316;font-weight:700;margin-left:4px">🔔${diff}g</span>`;
}

// ── DOPPIO TAP ─────────────────────────────────────────────────────────────────
const _tap={};
function doubleTap(id,prefix,iconOrig,cb){
  const key=prefix+id;
  const btn=document.getElementById(key);
  if(_tap[key]){clearTimeout(_tap[key]);delete _tap[key];if(btn)btn.textContent=iconOrig;cb();}
  else{if(btn)btn.textContent="❓";_tap[key]=setTimeout(()=>{delete _tap[key];if(btn)btn.textContent=iconOrig;},2000);}
}
function tapDel(id){doubleTap(id,"dbtn-","🗑",()=>askDel(id));}
function tapEdit(id){doubleTap(id,"ebtn-","✏️",()=>openEdit(id));}

// ── IFRAME ─────────────────────────────────────────────────────────────────────
function callScript(url){
  let f=document.getElementById("_sf");
  if(!f){f=document.createElement("iframe");f.id="_sf";f.style.display="none";document.body.appendChild(f);}
  f.src=url;
}

// ── TOAST ──────────────────────────────────────────────────────────────────────
function showToast(msg,dur=3000){
  const t=document.getElementById("toast");
  t.textContent=msg;t.style.display="block";
  const ok=msg.startsWith("✅");
  t.style.background=ok?"#065f46":"#7f1d1d";
  t.style.border=ok?"1px solid #10b981":"1px solid #ef4444";
  clearTimeout(toastT);toastT=setTimeout(()=>t.style.display="none",dur);
}

// ── CSV ────────────────────────────────────────────────────────────────────────
function parseCSV(text){
  const lines=text.trim().split("\n");
  if(lines.length<2)return[];
  return lines.slice(1).map((line,idx)=>{
    const cols=[];let cur="",inQ=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'&&line[i+1]==='"'){cur+='"';i++;}
      else if(line[i]==='"'){inQ=!inQ;}
      else if(line[i]===','&&!inQ){cols.push(cur.trim());cur="";}
      else cur+=line[i];
    }
    cols.push(cur.trim());
    const r={id:idx+2};
    CSV_COLS.forEach((k,i)=>{r[k]=(cols[i]||"").replace(/^"|"$/g,"").trim();});
    r.importo=r.importo?parseFloat(r.importo)||null:null;
    return r;
  }).filter(r=>r.contraente&&r.contraente.trim()&&r.contraente!=="\\"&&r.contraente!=="\\\\");
}

// ── LOAD ───────────────────────────────────────────────────────────────────────
setTimeout(()=>{const b=document.getElementById("retry-btn");if(b)b.style.display="block";},12000);

async function loadData(){
  try{
    const res=await fetch(CSV_URL+"&t="+Date.now(),{cache:"no-store"});
    if(!res.ok)throw new Error();
    const data=parseCSV(await res.text());
    if(!data.length)throw new Error();
    records=data;
    document.getElementById("src-lbl").textContent="● Sheets · "+data.length+" righe";
    document.getElementById("loading").style.display="none";
    document.getElementById("app").style.display="flex";
    updateKPIs();renderTab();
  }catch(e){
    document.getElementById("loading").innerHTML=`<div style="text-align:center"><div style="font-size:28px;margin-bottom:10px">⚠️</div><div style="color:#fca5a5;font-weight:700;font-size:13px;margin-bottom:16px">Connessione fallita</div><button onclick="location.reload()" style="background:#4f46e5;border:none;border-radius:8px;padding:10px 22px;color:#fff;font-size:13px;font-weight:700;cursor:pointer">↻ Riprova</button></div>`;
  }
}

async function doRefresh(){
  document.getElementById("src-lbl").textContent="↻ …";
  try{
    const res=await fetch(CSV_URL+"&t="+Date.now(),{cache:"no-store"});
    if(!res.ok)throw new Error();
    const data=parseCSV(await res.text());
    if(data.length){records=data;document.getElementById("src-lbl").textContent="● Sheets · "+data.length+" righe";updateKPIs();renderTab();showToast("✅ Aggiornato");}
  }catch(e){showToast("❌ Non raggiungibile");}
}

function updateKPIs(){
  document.getElementById("k-arr").textContent=records.filter(r=>isArr(r)).length;
  document.getElementById("k-att").textContent=records.filter(r=>r.stato==="ATTIVA").length;
  document.getElementById("k-tot").textContent=records.length;
}

// ── TAB ────────────────────────────────────────────────────────────────────────
function setTab(t){
  curTab=t;
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+t).classList.add("active");
  document.getElementById("content").innerHTML="";
  if(t!=="cerca"){searchQ="";filtriStato=[];filtriRamo=[];}
  renderTab();
}
function renderTab(){
  if(curTab==="lista")renderLista();
  else if(curTab==="arr")renderArr();
  else if(curTab==="cerca")renderCerca();
  else renderTot();
}

// ── CARD ───────────────────────────────────────────────────────────────────────
function cardHtml(r){
  const arr=isArr(r),ag=isAg(r);
  const c=sCol(r.stato);
  const borderL=ag?"3px solid "+c:arr?"3px solid #f97316":"3px solid #334155";
  const bg=ag?"rgba(13,148,136,.08)":arr?"rgba(249,115,22,.08)":"rgba(15,23,42,.95)";
  const bdr=ag?"1px solid rgba(13,148,136,.3)":arr?"1px solid rgba(249,115,22,.25)":"1px solid rgba(99,102,241,.12)";
  const sub=[r.settore,r.ramo,r.targa].filter(Boolean).join(" · ");
  const nota=r.nota1?`<div style="font-size:10px;color:#fde047;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">📝 ${esc(r.nota1)}</div>`:"";
  const emoAg=ag?`<span style="font-size:12px;margin-right:3px">${AGENDA_EMO[(r.stato||"").toUpperCase()]||""}</span>`:"";
  return`<div class="card" style="background:${bg};border:${bdr};border-left:${borderL}">
    <div class="card-l">
      <div class="card-name" onclick="openCli('${esc(r.contraente)}')">${esc(r.contraente||"—")}</div>
      <div class="card-sub">${esc(sub)}</div>
      <div class="card-tags">${emoAg}${badge(r.stato)}${scadAlert(r)}</div>
      ${nota}
    </div>
    <div class="card-r">
      <div class="date-lbl">SCAD</div>
      <div class="date-val" style="color:#38bdf8">${fmtShort(r.scad)}</div>
      <div class="date-lbl" style="margin-top:4px">TODO</div>
      <div class="date-val" style="color:#fde047">${fmtShort(r.todo)}</div>
      <div class="btns-row">
        <button id="dbtn-${r.id}" class="icon-btn del-btn" onclick="tapDel(${r.id})">🗑</button>
        <button id="ebtn-${r.id}" class="icon-btn edit-btn" onclick="tapEdit(${r.id})">✏️</button>
      </div>
    </div>
  </div>`;
}

// ── LISTA ──────────────────────────────────────────────────────────────────────
function sorted(lista){
  return[...lista].sort((a,b)=>{
    const va=dVal(a[sortField]),vb=dVal(b[sortField]);
    if(va===Infinity&&vb===Infinity)return(a.contraente||"").localeCompare(b.contraente||"");
    if(va===Infinity)return 1;if(vb===Infinity)return-1;
    return sortDir==="asc"?va-vb:vb-va;
  });
}
function renderLista(){
  const lista=sorted(records);
  document.getElementById("content").innerHTML=
    `<div class="sort-bar">
      <span class="sort-btn${sortField==="todo"?" on":""}" onclick="setSF('todo')">TODO</span>
      <span class="sort-btn${sortField==="scad"?" on":""}" onclick="setSF('scad')">SCAD</span>
      <span class="sort-dir" onclick="toggleDir()">${sortDir==="asc"?"↑ Vecchie":"↓ Recenti"}</span>
    </div>
    <div class="sec-lbl">${lista.length} righe</div>`+
    (lista.length?lista.map(cardHtml).join(""):`<div class="empty">Nessuna polizza</div>`);
}
function setSF(f){sortField=f;renderLista();}
function toggleDir(){sortDir=sortDir==="asc"?"desc":"asc";renderLista();}

// ── ARRETRATI ──────────────────────────────────────────────────────────────────
function renderArr(){
  const lista=sorted(records.filter(r=>isArr(r)));
  document.getElementById("content").innerHTML=
    `<div class="sec-lbl">🔴 ${lista.length} arretrati</div>`+
    (lista.length?lista.map(cardHtml).join(""):`<div class="empty">✅ Nessun arretrato</div>`);
}

// ── CERCA ──────────────────────────────────────────────────────────────────────
function renderCerca(){
  const el=document.getElementById("content");
  if(!document.getElementById("search-inp")){
    el.innerHTML=`<div class="search-wrap"><input class="search-inp" id="search-inp" placeholder="Contraente, targa, polizza, CF…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></div><div class="chip-bar" id="chips-stato"></div><div class="chip-bar" id="chips-ramo"></div><div id="cerca-ris"></div>`;
    document.getElementById("search-inp").addEventListener("input",function(){searchQ=this.value;renderCercaRis();});
    renderCercaChips();
    document.getElementById("search-inp").focus();
  }
  renderCercaRis();
}
function renderCercaChips(){
  const cs=document.getElementById("chips-stato");
  if(cs)cs.innerHTML=STATI.filter(s=>records.some(r=>r.stato===s)).map(s=>`<span class="chip${filtriStato.includes(s)?" on":""}" onclick="togSt('${s}')">${s}</span>`).join("");
  const cr=document.getElementById("chips-ramo");
  if(cr){const rami=[...new Set(records.map(r=>r.ramo).filter(Boolean))].sort();cr.innerHTML=rami.map(r=>`<span class="chip${filtriRamo.includes(r)?" on":""}" onclick="togRa('${r}')">${r}</span>`).join("");}
}
function togSt(v){filtriStato=filtriStato.includes(v)?filtriStato.filter(x=>x!==v):[...filtriStato,v];renderCercaChips();renderCercaRis();}
function togRa(v){filtriRamo=filtriRamo.includes(v)?filtriRamo.filter(x=>x!==v):[...filtriRamo,v];renderCercaChips();renderCercaRis();}
function renderCercaRis(){
  const ris=document.getElementById("cerca-ris");if(!ris)return;
  const q=searchQ.toLowerCase();
  let res=[...records];
  if(q)res=res.filter(r=>(r.contraente||"").toLowerCase().includes(q)||(r.polizza||"").toLowerCase().includes(q)||(r.targa||"").toLowerCase().includes(q)||(r.cf||"").toLowerCase().includes(q)||(r.nota1||"").toLowerCase().includes(q));
  if(filtriStato.length)res=res.filter(r=>filtriStato.includes(r.stato));
  if(filtriRamo.length)res=res.filter(r=>filtriRamo.includes(r.ramo));
  if(!q&&!filtriStato.length&&!filtriRamo.length){ris.innerHTML=`<div class="empty">👆 Scrivi o filtra</div>`;return;}
  res=sorted(res);
  ris.innerHTML=`<div class="sec-lbl">${res.length} risultati</div>`+(res.length?res.map(cardHtml).join(""):`<div class="empty">Nessun risultato</div>`);
}

// ── TOTALI ─────────────────────────────────────────────────────────────────────
function renderTot(){
  const att=records.filter(r=>!isArr(r));
  const tot=att.reduce((s,r)=>s+(r.importo||0),0);
  const bySett={},byRamo={};
  att.forEach(r=>{if(r.settore)bySett[r.settore]=(bySett[r.settore]||0)+(r.importo||0);if(r.ramo)byRamo[r.ramo]=(byRamo[r.ramo]||0)+(r.importo||0);});
  const rows=obj=>Object.entries(obj).sort(([,a],[,b])=>b-a).filter(([,v])=>v>0).map(([k,v])=>`<div class="tot-row"><span style="color:#94a3b8">${esc(k)}</span><span style="color:#818cf8;font-weight:700">${fmtEur(v)}</span></div>`).join("");
  document.getElementById("content").innerHTML=
    `<div class="tot-card" style="background:rgba(99,102,241,.08);border-color:rgba(99,102,241,.25)"><div style="display:flex;justify-content:space-between;align-items:center"><div style="font-size:11px;color:#94a3b8;font-weight:700">Totale portafoglio</div><div style="font-size:18px;font-weight:900;color:#818cf8">${fmtEur(tot)}</div></div></div>
    <div class="tot-card"><div class="tot-hdr">Per settore</div>${rows(bySett)}<div class="tot-footer"><span>Totale</span><span>${fmtEur(tot)}</span></div></div>
    <div class="tot-card"><div class="tot-hdr">Per ramo</div>${rows(byRamo)}</div>`;
}

// ── SCHEDA CLIENTE ─────────────────────────────────────────────────────────────
function openCli(nome){
  const righe=[...records].filter(r=>r.contraente===nome).sort((a,b)=>(isArr(b)?1:0)-(isArr(a)?1:0)||dVal(a.scad)-dVal(b.scad));
  document.getElementById("cli-title").textContent="👤 "+nome;
  const getAna=k=>{const x=righe.find(r=>r[k]&&String(r[k]).trim());return x?x[k]:"";};
  const ana=[["📍",[getAna("indirizzo"),getAna("citta")].filter(Boolean).join(", ")],["📞",getAna("cell")],["✉️",getAna("email")],["🪪",getAna("cf")]].filter(([,v])=>v&&String(v).trim());
  let html="";
  if(ana.length){
    html+=`<div style="background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);border-radius:10px;padding:10px 12px;margin-bottom:10px">${ana.map(([l,v])=>`<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(99,102,241,.06)"><span style="font-size:10px;color:#64748b;font-weight:700">${l}</span><span style="font-size:10px;color:#e2e8f0;font-weight:600;text-align:right;max-width:200px;word-break:break-word">${esc(v)}</span></div>`).join("")}</div>`;
  }
  html+=`<div class="sec-lbl">${righe.length} polizz${righe.length===1?"a":"e"}</div>`;
  righe.forEach(r=>{
    const arr=isArr(r);
    const campi=[["Ramo",r.ramo],["Polizza",r.polizza],["SCAD",fmtFull(r.scad)],["TODO",fmtFull(r.todo)],["Importo",r.importo?fmtEur(r.importo):""],["Rinn",r.rinn],["FR",r.fr],["Settore",r.settore],["Targa",r.targa],["Settori",r.settori],["Nota 1",r.nota1],["Nota 2",r.nota2]].filter(([,v])=>v&&String(v).trim());
    const bg=arr?"rgba(249,115,22,.08)":"rgba(15,23,42,.95)";
    const bdr=arr?"1px solid rgba(249,115,22,.25);border-left:3px solid #f97316":"1px solid rgba(99,102,241,.12);border-left:3px solid #334155";
    html+=`<div style="background:${bg};border:${bdr};border-radius:10px;padding:10px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">${badge(r.stato)}${scadAlert(r)}</div>
        <div style="display:flex;gap:6px">
          <button id="dbtn-${r.id}" class="icon-btn del-btn" onclick="tapDel(${r.id})" style="font-size:11px;padding:5px 8px">🗑</button>
          <button id="ebtn-${r.id}" class="icon-btn edit-btn" onclick="tapEdit(${r.id})" style="font-size:11px;padding:5px 8px">✏️ Mod</button>
        </div>
      </div>
      ${campi.map(([l,v])=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(99,102,241,.06)"><span style="font-size:10px;color:#64748b;font-weight:700;min-width:70px">${l}</span><span style="font-size:11px;color:#f1f5f9;font-weight:600;text-align:right;word-break:break-word;max-width:200px">${esc(v||"")}</span></div>`).join("")}
    </div>`;
  });
  document.getElementById("cli-body").innerHTML=html;
  document.getElementById("cli-ov").style.display="flex";
}
function closeCli(){document.getElementById("cli-ov").style.display="none";}

// ── ELIMINA ────────────────────────────────────────────────────────────────────
function askDel(id){
  pendDelId=id;
  const r=records.find(x=>x.id===id);
  document.getElementById("confirm-txt").textContent=`Eliminare la riga di ${r?r.contraente:"questa polizza"}?`;
  document.getElementById("confirm-box").style.display="flex";
}
function cancelDel(){document.getElementById("confirm-box").style.display="none";pendDelId=null;}
function confirmDel(){
  document.getElementById("confirm-box").style.display="none";
  if(!pendDelId)return;
  const id=pendDelId;pendDelId=null;
  callScript(SCRIPT_URL+"?action=delete&row="+id);
  records=records.filter(r=>r.id!==id);
  closeCli();updateKPIs();renderTab();
  showToast("✅ Eliminata");
}

// ── MODIFICA ───────────────────────────────────────────────────────────────────
const CAMPI_EDIT=[
  {key:"contraente",label:"Contraente",type:"text",wide:true},
  {key:"ramo",label:"Ramo",type:"text"},
  {key:"polizza",label:"N° Polizza",type:"text"},
  {key:"scad",label:"SCAD",type:"date"},
  {key:"todo",label:"TO-DO",type:"date"},
  {key:"importo",label:"Importo €",type:"number"},
  {key:"rinn",label:"Rinnovo",type:"select",opts:["","S","N"]},
  {key:"fr",label:"FR",type:"text"},
  {key:"settore",label:"Settore",type:"select",opts:SETTORI},
  {key:"stato",label:"Stato",type:"select",opts:STATI},
  {key:"targa",label:"Targa",type:"text"},
  {key:"settori",label:"Settori",type:"text"},
  {key:"nota1",label:"Nota 1",type:"textarea",wide:true},
  {key:"nota2",label:"Nota 2",type:"textarea",wide:true},
  {key:"capo",label:"Capo",type:"text"},
  {key:"rami",label:"Rami",type:"text"},
  {key:"indirizzo",label:"Indirizzo",type:"text",wide:true},
  {key:"citta",label:"Città",type:"text"},
  {key:"cell",label:"Cellulare",type:"text"},
  {key:"email",label:"Email",type:"text",wide:true},
  {key:"tipolCli",label:"Tipol. Cli",type:"text"},
  {key:"sub",label:"Sub",type:"text"},
  {key:"cf",label:"CF/Conv",type:"text",wide:true},
];

function openEdit(id){
  const r=records.find(x=>x.id===id);if(!r)return;
  curEditId=id;
  document.getElementById("edit-title").textContent=r.contraente;
  let html=`<div class="form-grid">`;
  CAMPI_EDIT.forEach(({key,label,type,opts,wide})=>{
    const val=String(r[key]||"");
    html+=`<div class="fld${wide?" wide":""}"><label>${label}</label>`;
    if(type==="select"){
      html+=`<select id="ef-${key}"><option value=""></option>${opts.map(o=>`<option value="${esc(o)}"${o===val?" selected":""}>${esc(o)}</option>`).join("")}</select>`;
    }else if(type==="textarea"){
      html+=`<textarea id="ef-${key}">${esc(val)}</textarea>`;
    }else if(type==="date"){
      const iso=toISO(val);
      if(key==="scad"){
        html+=`<div class="date-row"><input type="date" id="ef-${key}" value="${iso}"><button class="cal-btn" onclick="prorogaScad()">📅+1</button></div>`;
      }else{
        html+=`<input type="date" id="ef-${key}" value="${iso}">`;
      }
    }else if(type==="number"){
      html+=`<input type="number" step="0.01" id="ef-${key}" value="${val}">`;
    }else{
      html+=`<input type="text" id="ef-${key}" value="${esc(val)}">`;
    }
    html+=`</div>`;
  });
  html+=`</div>`;
  document.getElementById("edit-body").innerHTML=html;
  document.getElementById("edit-ov").style.display="flex";
}

function prorogaScad(){
  const se=document.getElementById("ef-scad");
  const te=document.getElementById("ef-todo");
  if(!se||!se.value)return;
  const d=parseDate(se.value);if(!d)return;
  d.setFullYear(d.getFullYear()+1);
  const iso=toISO(d);
  se.value=iso;
  if(te)te.value=iso;
  showToast("✅ Date spostate +1 anno");
}

function closeEdit(){document.getElementById("edit-ov").style.display="none";curEditId=null;}

function saveEdit(){
  const r=records.find(x=>x.id===curEditId);if(!r)return;
  const campi={},campiOld={};

  CAMPI_EDIT.forEach(({key,type})=>{
    const el=document.getElementById("ef-"+key);if(!el)return;
    // Leggi il valore grezzo dal campo
    const raw=el.value.trim();
    // Per date: converti da ISO (YYYY-MM-DD) a DMY (DD/MM/YYYY) per Sheets
    const nv=(type==="date"&&raw)?isoToDMY(raw):raw;
    // Valore vecchio nel record
    const ov=String(r[key]||"").trim();
    // Per confronto: normalizza entrambi in ISO se è una data
    const nvCmp=(type==="date"&&nv)?toISO(nv):nv;
    const ovCmp=(type==="date"&&ov)?toISO(ov):ov;
    if(nvCmp!==ovCmp&&COL_MAP[key]){campi[COL_MAP[key]]=nv;campiOld[COL_MAP[key]]=ov;}
  });

  if(!Object.keys(campi).length){showToast("Nessuna modifica");closeEdit();return;}

  // *** Aggiorna record in memoria PRIMA di chiudere ***
  Object.entries(campi).forEach(([col,val])=>{
    const key=Object.keys(COL_MAP).find(k=>COL_MAP[k]===parseInt(col));
    if(!key)return;
    r[key]=key==="importo"?(val?parseFloat(val)||null:null):val;
  });

  const rowId=curEditId;
  closeEdit();closeCli();
  updateKPIs();renderTab();

  const url=SCRIPT_URL+"?action=edit&row="+rowId+"&campi="+encodeURIComponent(JSON.stringify(campi));
  callScript(url);
  showToast("✅ Salvato");
}

// ── NUOVA RIGA ─────────────────────────────────────────────────────────────────
function openNuova(){
  let html=`<div class="form-grid">`;
  CAMPI_EDIT.forEach(({key,label,type,opts,wide})=>{
    html+=`<div class="fld${wide?" wide":""}"><label>${label}</label>`;
    if(type==="select")html+=`<select id="nf-${key}"><option value=""></option>${opts.map(o=>`<option value="${esc(o)}">${esc(o)}</option>`).join("")}</select>`;
    else if(type==="textarea")html+=`<textarea id="nf-${key}"></textarea>`;
    else if(type==="date")html+=`<input type="date" id="nf-${key}">`;
    else if(type==="number")html+=`<input type="number" step="0.01" id="nf-${key}">`;
    else html+=`<input type="text" id="nf-${key}">`;
    html+=`</div>`;
  });
  html+=`</div>`;
  document.getElementById("nuova-body").innerHTML=html;
  document.getElementById("nuova-ov").style.display="flex";
}
function closeNuova(){document.getElementById("nuova-ov").style.display="none";}
function saveNuova(){
  const contraente=document.getElementById("nf-contraente")?.value.trim();
  if(!contraente){showToast("❌ Contraente obbligatorio");return;}
  const valori=CSV_COLS.map(k=>{
    const el=document.getElementById("nf-"+k);
    if(!el)return"";
    const v=el.value.trim();
    return(el.type==="date"&&v)?isoToDMY(v):v;
  });
  closeNuova();
  callScript(SCRIPT_URL+"?action=insert&valori="+encodeURIComponent(JSON.stringify(valori)));
  showToast("✅ Riga inserita — premi ↻ tra qualche secondo");
}

// ── AVVIO ──────────────────────────────────────────────────────────────────────
loadData();
</script>
