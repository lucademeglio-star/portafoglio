<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Portafoglio">
<meta name="theme-color" content="#080d1a">
<title>Portafoglio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#080d1a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(59,130,246,.3);border-radius:9px}
input::placeholder{color:#334155}select option{background:#111e3a;color:#e2e8f0}
@keyframes spin{to{transform:rotate(360deg)}}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
#topbar{background:linear-gradient(160deg,#0c1830,#111e3a);border-bottom:1px solid rgba(59,130,246,.2);padding:10px 14px 0;flex-shrink:0}
.top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.logo{font-size:14px;font-weight:900;color:#f1f5f9}
.source{font-size:9px;color:#475569;text-transform:uppercase;margin-top:1px}
.kpis{display:flex;gap:5px}
.kpi{border-radius:7px;padding:5px 9px;text-align:center}
.kpi-v{font-size:15px;font-weight:900;line-height:1}
.kpi-l{font-size:8px;color:#475569;text-transform:uppercase;margin-top:1px}
.k-red{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3)}.v-red{color:#ef4444}
.k-grn{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3)}.v-grn{color:#10b981}
.k-blu{background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.3)}.v-blu{color:#60a5fa}
.refresh-btn{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);border-radius:8px;padding:8px 14px;color:#6ee7b7;font-size:12px;font-weight:700;cursor:pointer}
.tabs{display:flex}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:11px;font-weight:700;text-transform:uppercase;color:#475569;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer}
.tab.active{color:#93c5fd;border-bottom:2px solid #3b82f6}
#content{flex:1;overflow-y:auto;padding:8px 10px;-webkit-overflow-scrolling:touch}
.sort-bar{display:flex;gap:5px;margin-bottom:8px;align-items:center}
.sort-btn{padding:6px 13px;border-radius:16px;font-size:11px;font-weight:700;border:1px solid rgba(59,130,246,.2);background:rgba(20,32,60,.9);color:#64748b;cursor:pointer}
.sort-btn.active{background:rgba(59,130,246,.3);border-color:#3b82f6;color:#93c5fd}
.sort-dir{padding:6px 12px;border-radius:16px;font-size:11px;font-weight:700;border:1px solid rgba(59,130,246,.2);background:rgba(20,32,60,.9);color:#64748b;cursor:pointer;margin-left:auto}
.card{border-radius:8px;padding:8px 10px;margin-bottom:5px;display:flex;align-items:center;gap:8px;background:rgba(20,32,60,.8);border:1px solid rgba(59,130,246,.1);border-left:3px solid #334155}
.card.arr{background:rgba(249,115,22,.08);border-color:rgba(249,115,22,.22);border-left-color:#f97316}
.card-l{flex:1;min-width:0}
.card-name{font-size:12px;font-weight:700;color:#93c5fd;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;text-decoration:underline;text-decoration-color:rgba(147,197,253,.3)}
.card-sub{font-size:9px;color:#64748b;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-tags{margin-top:3px;display:flex;gap:3px;flex-wrap:wrap;align-items:center}
.card-r{flex-shrink:0;text-align:right}
.badge{font-size:7px;font-weight:700;border-radius:3px;padding:2px 4px;display:inline-block}
.arr-badge{font-size:7px;font-weight:800;color:#f97316;background:rgba(249,115,22,.2);border-radius:3px;padding:2px 5px}
.imp-badge{font-size:7px;color:#64748b;padding:2px 4px;background:rgba(255,255,255,.05);border-radius:3px}
.date-col{font-size:10px;font-weight:800;color:#94a3b8}
.pol-num{font-size:8px;color:#334155;margin-top:2px;font-family:monospace}
.search-wrap{position:relative;margin-bottom:7px}
.search-inp{width:100%;background:rgba(20,32,60,.9);border:1px solid rgba(59,130,246,.25);border-radius:8px;padding:9px 30px 9px 12px;color:#f1f5f9;font-size:14px;outline:none;font-family:inherit}
.chip-bar{display:flex;gap:4px;margin-bottom:7px;overflow-x:auto;padding-bottom:2px}
.chip{padding:5px 10px;border-radius:16px;font-size:10px;font-weight:700;background:rgba(20,32,60,.9);border:1px solid rgba(59,130,246,.15);color:#64748b;cursor:pointer;white-space:nowrap;flex-shrink:0}
.chip.active{background:rgba(59,130,246,.3);border-color:#3b82f6;color:#93c5fd}
.overlay{position:fixed;inset:0;background:#080d1a;z-index:100;display:flex;flex-direction:column}
.ov-hdr{background:linear-gradient(160deg,#0c1830,#111e3a);border-bottom:1px solid rgba(59,130,246,.2);padding:12px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.ov-title{font-size:14px;font-weight:800;color:#f1f5f9;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ov-body{flex:1;overflow-y:auto;padding:12px 14px;-webkit-overflow-scrolling:touch}
.pol-card{background:rgba(20,32,60,.8);border:1px solid rgba(59,130,246,.1);border-radius:8px;padding:10px;margin-bottom:8px}
.pol-card.arr{border-left:3px solid #f97316;background:rgba(249,115,22,.07)}
.pol-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:6px}
.pol-cell{background:rgba(10,15,26,.4);border-radius:5px;padding:5px 7px}
.pol-lbl{font-size:7px;color:#475569;text-transform:uppercase;margin-bottom:1px}
.pol-val{font-size:10px;font-weight:600;color:#e2e8f0;word-break:break-all}
.note-box{background:rgba(234,179,8,.07);border:1px solid rgba(234,179,8,.2);border-radius:6px;padding:6px 8px;margin-top:6px}
.note-lbl{font-size:7px;color:#ca8a04;text-transform:uppercase;margin-bottom:1px}
.note-val{font-size:10px;color:#fde047}
.del-btn{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:6px;padding:5px 10px;color:#fca5a5;font-size:10px;font-weight:700;cursor:pointer}
.tot-grand{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:10px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.tot-box{background:rgba(20,32,60,.8);border:1px solid rgba(59,130,246,.1);border-radius:8px;padding:9px 11px;margin-bottom:8px}
.tot-hdr{font-size:8px;color:#475569;text-transform:uppercase;margin-bottom:5px;font-weight:700}
.tot-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(59,130,246,.06)}
.tot-row:last-child{border-bottom:none}
.tot-lbl{font-size:10px;color:#94a3b8}.tot-val{font-size:10px;font-weight:800;color:#60a5fa}
.btn-s{background:rgba(20,32,60,.9);border:1px solid rgba(59,130,246,.3);border-radius:7px;padding:9px 14px;color:#93c5fd;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}
.btn-p{background:linear-gradient(135deg,#1d4ed8,#2563eb);border:none;border-radius:7px;padding:9px 14px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}
.spinner{width:30px;height:30px;border:3px solid rgba(59,130,246,.2);border-top-color:#3b82f6;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 9px}
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);padding:8px 16px;border-radius:8px;font-weight:700;z-index:999;font-size:12px;white-space:nowrap;display:none}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;padding:20px}
.sec-label{font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;font-weight:700}
.empty{text-align:center;padding:32px 16px;color:#475569;font-size:12px}
.confirm-box{position:fixed;inset:0;background:rgba(5,8,18,.9);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.confirm-inner{background:#111e3a;border:1px solid rgba(239,68,68,.3);border-radius:12px;padding:20px;max-width:320px;width:100%;text-align:center}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div style="font-size:12px;color:#64748b;text-align:center">Connessione a Google Sheets…<br><small style="color:#334155">Prima apertura: 5-10 secondi</small></div>
  <button onclick="location.reload()" style="background:rgba(59,130,246,.2);border:1px solid rgba(59,130,246,.3);border-radius:8px;padding:8px 16px;color:#93c5fd;font-size:11px;font-weight:700;cursor:pointer;display:none" id="retry-btn">↻ Riprova</button>
</div>

<div id="app" style="display:none">
  <div id="topbar">
    <div class="top-row">
      <div><div class="logo">🛡 Portafoglio</div><div class="source" id="src-lbl">…</div></div>
      <div style="display:flex;gap:6px;align-items:center">
        <div class="kpis">
          <div class="kpi k-red"><div class="kpi-v v-red" id="k-arr">0</div><div class="kpi-l">ARR</div></div>
          <div class="kpi k-grn"><div class="kpi-v v-grn" id="k-att">0</div><div class="kpi-l">Attive</div></div>
          <div class="kpi k-blu"><div class="kpi-v v-blu" id="k-tot">0</div><div class="kpi-l">Tot</div></div>
        </div>
        <button class="refresh-btn" onclick="doRefresh()">↻</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" id="tab-lista" onclick="setTab('lista')">📋 Lista</button>
      <button class="tab" id="tab-arr" onclick="setTab('arr')">🔴 ARR</button>
      <button class="tab" id="tab-cerca" onclick="setTab('cerca')">🔍 Cerca</button>
      <button class="tab" id="tab-tot" onclick="setTab('tot')">📊 Tot</button>
    </div>
  </div>
  <div id="content"></div>
</div>

<div class="overlay" id="cli-ov" style="display:none">
  <div class="ov-hdr">
    <button class="btn-s" onclick="closeCli()">← Torna</button>
    <div class="ov-title" id="cli-title"></div>
  </div>
  <div class="ov-body" id="cli-body"></div>
</div>

<!-- EDIT OVERLAY -->
<div class="overlay" id="edit-ov" style="display:none;z-index:200">
  <div class="ov-hdr">
    <button class="btn-s" onclick="closeEdit()">✕ Annulla</button>
    <div class="ov-title" id="edit-title"></div>
    <button class="btn-p" onclick="saveEdit()">💾 Salva</button>
  </div>
  <div class="ov-body" id="edit-body"></div>
</div>

<div id="confirm-box" class="confirm-box" style="display:none">
  <div class="confirm-inner">
    <div style="font-size:20px;margin-bottom:8px">🗑</div>
    <div style="font-size:13px;font-weight:700;color:#f1f5f9;margin-bottom:6px" id="confirm-txt">Eliminare questa riga?</div>
    <div style="font-size:10px;color:#64748b;margin-bottom:16px">L'operazione non è reversibile.</div>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn-p" style="background:rgba(239,68,68,.8)" onclick="confirmDelete()">Sì, elimina</button>
      <button class="btn-s" onclick="cancelDelete()">Annulla</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1eptc1n6yyUfgKrqpppQtuYn7VDCE5CddSMHKf1Sj6hs/export?format=csv&gid=59454588";
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzCeGfHs9fLXgwn0nTxX_28ncuJSKDjzqz0lpLahbdflGlo0K7uJDJUy4t-J1zuy7k26w/exec";
const CSV_COLS = ["contraente","ramo","polizza","scad","todo","importo","rinn","fr","settore","stato","targa","settori","nota1","nota2","capo","rami","indirizzo","citta","cell","email","tipolCli","sub","cf"];
const SETTORI = ["RCA","INFORTUNI","RCG","RDP","FURTO","ARRETRATO","SCREENING","#SALUTE","IRO","IMP","INF","VITA","VITA INDIVIDUALI","VITA-FONDI","TCM","CASA","CAT NAT","CAUZIONI","TRASPORTI","FAMIGLIA","DOC","MAL","MALATTIE","CVT","TOP","VARI","PROVV"];
const STATI = ["ATTIVA","SCHEDA","PROSPETTIVA","RECUPERO","ARR","SOSPESA","DOCUMENTI","LISTE","PREV RCA URG","BPER","SENZA SPER","SINISTRO","SCAD","RIFORMA","BDA","CAT NAT"];
const STATO_COL = {ATTIVA:"#10b981",SCHEDA:"#3b82f6",PROSPETTIVA:"#a78bfa",RECUPERO:"#f59e0b",ARR:"#ef4444",SOSPESA:"#6b7280",DOCUMENTI:"#06b6d4",BDA:"#8b5cf6"};

const sCol = s => STATO_COL[s] || "#6b7280";
const isArr = r => (r.stato||"").toUpperCase()==="ARR" || (r.settore||"").toUpperCase()==="ARRETRATO";
const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const fmtEur = v => v!=null&&v!==""? "€ "+parseFloat(v).toLocaleString("it-IT",{minimumFractionDigits:2}) : "—";

const MESI_IT = {gen:"Jan",feb:"Feb",mar:"Mar",apr:"Apr",mag:"May",giu:"Jun",lug:"Jul",ago:"Aug",set:"Sep",ott:"Oct",nov:"Nov",dic:"Dec"};

function normalizeDate(s) {
  if (!s || typeof s !== "string") return null;
  s = s.trim();
  if (!s || s==="\\" || s==="/" || s.length<5) return null;
  s = s.replace(/\b(gen|feb|mar|apr|mag|giu|lug|ago|set|ott|nov|dic)\b/gi, m => MESI_IT[m.toLowerCase()]||m);
  const mDMY = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (mDMY) s = `${mDMY[3]}-${mDMY[2].padStart(2,"0")}-${mDMY[1].padStart(2,"0")}`;
  s = s.replace(/-(\d{2})$/, (m,y) => "-20"+y);
  const d = new Date(s);
  if (!isNaN(d) && d.getFullYear()>=2000 && d.getFullYear()<=2040) return d;
  return null;
}
function dateVal(s) { const d=normalizeDate(s); return d?d.getTime():Infinity; }
function fmtShort(s) {
  const d=normalizeDate(s); if(!d) return "—";
  return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0");
}
function fmtFull(s) {
  const d=normalizeDate(s); if(!d) return "—";
  return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear();
}

function parseCSV(text) {
  const lines = text.trim().split("\n");
  if (lines.length < 2) return [];
  return lines.slice(1).map((line,idx) => {
    const cols=[]; let cur="", inQ=false;
    for (let i=0;i<line.length;i++) {
      if (line[i]==='"'&&line[i+1]==='"'){cur+='"';i++;}
      else if (line[i]==='"'){inQ=!inQ;}
      else if (line[i]===','&&!inQ){cols.push(cur.trim());cur="";}
      else cur+=line[i];
    }
    cols.push(cur.trim());
    const r={id:idx+2};
    CSV_COLS.forEach((k,i)=>{r[k]=(cols[i]||"").replace(/^"|"$/g,"").trim();});
    r.importo = r.importo ? parseFloat(r.importo) || null : null;
    return r;
  }).filter(r=>r.contraente&&r.contraente.trim()&&r.contraente!=="\\"&&r.contraente!=="\\\\");
}

let records=[], curTab="lista", searchQ="", filtriSett=[], filtriStato=[], filtriRamo=[], sortField="todo", sortDir="asc", pendingDeleteId=null;

// Rami disponibili estratti dai dati
function getRami() {
  const set = new Set(records.map(r=>r.ramo).filter(r=>r&&r.trim()&&!isNaN(r)));
  return [...set].sort((a,b)=>+a-+b);
}

setTimeout(()=>{ const b=document.getElementById("retry-btn"); if(b)b.style.display="block"; },15000);

async function loadData() {
  try {
    const res = await fetch(CSV_URL, {cache:"no-cache"});
    if (!res.ok) throw new Error("HTTP "+res.status);
    const data = parseCSV(await res.text());
    if (data.length===0) throw new Error("Nessun dato");
    records = data;
    document.getElementById("src-lbl").textContent = "● Sheets · "+data.length+" righe";
    finish();
  } catch(e) {
    document.getElementById("loading").innerHTML = `
      <div style="text-align:center;padding:20px">
        <div style="font-size:28px;margin-bottom:10px">⚠️</div>
        <div style="color:#fca5a5;font-weight:700;font-size:13px;margin-bottom:8px">Connessione fallita</div>
        <div style="color:#64748b;font-size:11px;margin-bottom:20px">Verifica connessione e che il foglio sia pubblico.</div>
        <button onclick="location.reload()" style="background:#2563eb;border:none;border-radius:8px;padding:10px 22px;color:#fff;font-size:13px;font-weight:700;cursor:pointer">↻ Riprova</button>
      </div>`;
  }
}

function finish() {
  document.getElementById("loading").style.display="none";
  document.getElementById("app").style.display="flex";
  updateKPIs(); renderTab();
}

async function doRefresh() {
  document.getElementById("src-lbl").textContent="↻ …";
  try {
    const res=await fetch(CSV_URL,{cache:"no-cache"});
    if(!res.ok) throw new Error();
    const data=parseCSV(await res.text());
    if(data.length>0){records=data;document.getElementById("src-lbl").textContent="● Sheets · "+data.length+" righe";updateKPIs();renderTab();showToast("✅ Aggiornato");}
  } catch(e){showToast("⚠ Non raggiungibile");document.getElementById("src-lbl").textContent="● "+records.length+" righe (cache)";}
}

function updateKPIs() {
  document.getElementById("k-arr").textContent=records.filter(r=>isArr(r)).length;
  document.getElementById("k-att").textContent=records.filter(r=>r.stato==="ATTIVA").length;
  document.getElementById("k-tot").textContent=records.length;
}

function setTab(t) {
  curTab=t;
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+t).classList.add("active");
  document.getElementById("content").innerHTML="";
  // Reset filtri quando si cambia tab
  if(t!=="cerca"){searchQ="";filtriSett=[];filtriStato=[];filtriRamo=[];}
  renderTab();
}
function renderTab() {
  if(curTab==="lista")renderLista();
  else if(curTab==="arr")renderArr();
  else if(curTab==="cerca")renderCerca();
  else renderTot();
}

function cardHtml(r) {
  const arr=isArr(r);
  const arrB=arr?'<span class="arr-badge">ARR</span> ':"";
  const statoB=`<span class="badge" style="color:${sCol(r.stato)};background:${sCol(r.stato)}22">${esc(r.stato||"—")}</span>`;
  const imp=r.importo?`<span class="imp-badge">€${parseFloat(r.importo).toLocaleString("it-IT")}</span>`:"";
  const sub=[r.settore,r.targa,r.settori].filter(Boolean).join(" · ");
  const dateField=sortField==="scad"?r.scad:r.todo;
  const dateD=fmtFull(dateField);
  const pol=r.polizza?`<div class="pol-num">${String(r.polizza).slice(-6)}</div>`:"";
  const nota1=r.nota1?`<div style="font-size:9px;color:#fde047;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">📝 ${esc(r.nota1)}</div>`:"";
  const nota2=r.nota2?`<div style="font-size:9px;color:#fde047;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">📝 ${esc(r.nota2)}</div>`:"";
  return `<div class="card${arr?" arr":""}">
    <div class="card-l">
      <div class="card-name" onclick="openCli('${esc(r.contraente)}')">${arrB}${esc(r.contraente||"—")}</div>
      <div class="card-sub">${esc(sub)}</div>
      <div class="card-tags">${statoB}${imp}</div>
      ${nota1}${nota2}
    </div>
    <div class="card-r"><div class="date-col">${dateD}</div>${pol}</div>
  </div>`;
}

function sorted(campo) {
  return [...records].sort((a,b)=>{
    const va=dateVal(a[campo]),vb=dateVal(b[campo]);
    if(va===Infinity&&vb===Infinity)return(a.contraente||"").localeCompare(b.contraente||"");
    if(va===Infinity)return 1;if(vb===Infinity)return-1;
    return sortDir==="asc"?va-vb:vb-va;
  });
}

function renderLista() {
  const lista=sorted(sortField==="scad"?"scad":"todo");
  let html=`<div class="sort-bar">
    <span class="sort-btn${sortField==="todo"?" active":""}" onclick="setSortField('todo')">TO-DO</span>
    <span class="sort-btn${sortField==="scad"?" active":""}" onclick="setSortField('scad')">SCAD</span>
    <span class="sort-dir" onclick="toggleDir()">${sortDir==="asc"?"↑ Vecchie":"↓ Recenti"}</span>
  </div>`;
  html+=`<div class="sec-label">${lista.length} righe</div>`;
  html+=lista.map(r=>cardHtml(r)).join("");
  document.getElementById("content").innerHTML=html;
}
function setSortField(f){sortField=f;renderLista();}
function toggleDir(){sortDir=sortDir==="asc"?"desc":"asc";renderLista();}

function renderArr() {
  const lista=[...records].filter(r=>isArr(r)).sort((a,b)=>dateVal(a.todo)-dateVal(b.todo));
  document.getElementById("content").innerHTML=`<div class="sec-label">🔴 ${lista.length} arretrati</div>`
    +(lista.length===0?`<div class="empty">✅ Nessun arretrato</div>`:lista.map(r=>cardHtml(r)).join(""));
}

function renderCerca() {
  const el=document.getElementById("content");
  if(!document.getElementById("search-inp")){
    el.innerHTML=`
      <div class="search-wrap">
        <input class="search-inp" id="search-inp" placeholder="Contraente, targa, polizza, CF…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <span style="position:absolute;right:10px;top:50%;transform:translateY(-50%);color:#475569">🔍</span>
      </div>
      <div class="sec-label" style="margin-bottom:3px">Ramo</div>
      <div class="chip-bar" id="chips-ramo"></div>
      <div class="sec-label" style="margin-bottom:3px">Settore</div>
      <div class="chip-bar" id="chips-sett"></div>
      <div class="sec-label" style="margin-bottom:3px">Stato</div>
      <div class="chip-bar" id="chips-stato"></div>
      <div id="cerca-ris"></div>`;
    document.getElementById("search-inp").addEventListener("input",function(){
      searchQ=this.value;
      // Reset filtri se campo svuotato
      if(!this.value){filtriSett=[];filtriStato=[];filtriRamo=[];renderCercaChips();}
      renderCercaRis();
    });
    renderCercaChips();
    document.getElementById("search-inp").focus();
  }
  renderCercaRis();
}

function renderCercaChips() {
  const cr=document.getElementById("chips-ramo");
  if(cr) cr.innerHTML=getRami().map(r=>`<span class="chip${filtriRamo.includes(r)?" active":""}" onclick="togRamo('${r}')">${r}</span>`).join("");
  const cs=document.getElementById("chips-sett");
  if(cs) cs.innerHTML=SETTORI.map(s=>`<span class="chip${filtriSett.includes(s)?" active":""}" onclick="togSett('${s}')">${s}</span>`).join("");
  const cst=document.getElementById("chips-stato");
  if(cst) cst.innerHTML=STATI.map(s=>`<span class="chip${filtriStato.includes(s)?" active":""}" onclick="togStat('${s}')">${s}</span>`).join("");
}
function togRamo(v){filtriRamo=filtriRamo.includes(v)?filtriRamo.filter(x=>x!==v):[...filtriRamo,v];renderCercaChips();renderCercaRis();}
function togSett(v){filtriSett=filtriSett.includes(v)?filtriSett.filter(x=>x!==v):[...filtriSett,v];renderCercaChips();renderCercaRis();}
function togStat(v){filtriStato=filtriStato.includes(v)?filtriStato.filter(x=>x!==v):[...filtriStato,v];renderCercaChips();renderCercaRis();}

function renderCercaRis() {
  const ris=document.getElementById("cerca-ris");if(!ris)return;
  const q=searchQ;let res=[...records];
  if(q){const t=q.toLowerCase();res=res.filter(r=>(r.contraente||"").toLowerCase().includes(t)||(r.polizza||"").toLowerCase().includes(t)||(r.targa||"").toLowerCase().includes(t)||(r.cf||"").toLowerCase().includes(t)||(r.nota1||"").toLowerCase().includes(t));}
  if(filtriRamo.length>0) res=res.filter(r=>filtriRamo.includes(r.ramo));
  if(filtriSett.length>0) res=res.filter(r=>filtriSett.includes(r.settore));
  if(filtriStato.length>0) res=res.filter(r=>filtriStato.includes(r.stato));
  if(!q&&!filtriSett.length&&!filtriStato.length&&!filtriRamo.length){ris.innerHTML=`<div class="empty">👆 Scrivi o seleziona filtri</div>`;return;}
  res.sort((a,b)=>dateVal(a.todo)-dateVal(b.todo));
  ris.innerHTML=`<div class="sec-label">${res.length} risultati</div>`
    +(res.length===0?`<div class="empty">🔍 Nessun risultato</div>`:res.map(r=>cardHtml(r)).join(""));
}

function renderTot() {
  const attive=records.filter(r=>!isArr(r));
  const tot=attive.reduce((s,r)=>s+(parseFloat(r.importo)||0),0);
  const bySett={},byRamo={};
  attive.forEach(r=>{
    const s=r.settore||"N/D";if(!bySett[s])bySett[s]=0;bySett[s]+=(parseFloat(r.importo)||0);
    const rm=r.ramo||"N/D";if(!byRamo[rm])byRamo[rm]=0;byRamo[rm]+=(parseFloat(r.importo)||0);
  });
  const sOrd=Object.entries(bySett).sort(([,a],[,b])=>b-a).filter(([,v])=>v>0);
  const rOrd=Object.entries(byRamo).sort(([,a],[,b])=>b-a).filter(([,v])=>v>0);
  document.getElementById("content").innerHTML=`
    <div class="tot-grand"><div><div style="font-size:9px;color:#64748b;font-weight:700;text-transform:uppercase">Totale portafoglio</div><div style="font-size:8px;color:#475569">${attive.length} polizze</div></div><div style="font-size:16px;font-weight:900;color:#60a5fa">${fmtEur(tot)}</div></div>
    <div class="tot-box"><div class="tot-hdr">Per settore</div>${sOrd.map(([s,v])=>`<div class="tot-row"><span class="tot-lbl">${esc(s)}</span><span class="tot-val">${fmtEur(v)}</span></div>`).join("")}</div>
    <div class="tot-box"><div class="tot-hdr">Per ramo</div>${rOrd.map(([s,v])=>`<div class="tot-row"><span class="tot-lbl">${esc(s)}</span><span class="tot-val">${fmtEur(v)}</span></div>`).join("")}</div>`;
}

// CLIENTE
function openCli(nome) {
  const righe=[...records].filter(r=>r.contraente===nome).sort((a,b)=>(isArr(b)?1:0)-(isArr(a)?1:0)||dateVal(a.todo)-dateVal(b.todo));
  document.getElementById("cli-title").textContent="👤 "+nome;
  let html=`<div class="sec-label">${righe.length} righe</div>`;
  righe.forEach(r=>{
    const arr=isArr(r);
    const campi=[
      ["Contraente",r.contraente],["Ramo",r.ramo],["Polizza",r.polizza],
      ["SCAD",r.scad],["TO-DO",r.todo],["Importo",fmtEur(r.importo)],
      ["Rinn",r.rinn],["FR",r.fr],["Settore",r.settore],["Stato",r.stato],
      ["Targa",r.targa],["Settori",r.settori],["Nota 1",r.nota1],["Nota 2",r.nota2],
      ["Capo",r.capo],["Rami",r.rami],["Indirizzo",r.indirizzo],["Città",r.citta],
      ["Cell",r.cell],["Email",r.email],["Tipol. Cli",r.tipolCli],["Sub",r.sub],["CF/Conv",r.cf]
    ].filter(([,v])=>v&&String(v).trim()&&String(v).trim()!=="—");
    html+=`<div class="pol-card${arr?" arr":""}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">
          ${arr?'<span class="arr-badge">ARR</span>':""}
          <span class="badge" style="color:${sCol(r.stato)};background:${sCol(r.stato)}22;font-size:9px;padding:3px 7px">${esc(r.stato||"—")}</span>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn-p" style="padding:5px 10px;font-size:10px" onclick="openEdit(${r.id})">✏️ Modifica</button>
          <button class="del-btn" onclick="askDelete(${r.id},'${esc(r.contraente)}')">🗑 Elimina</button>
        </div>
      </div>
      ${campi.map(([l,v])=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(59,130,246,.06)">
        <span style="font-size:9px;color:#475569;text-transform:uppercase;font-weight:700;min-width:80px">${l}</span>
        <span style="font-size:11px;color:#e2e8f0;text-align:right;word-break:break-word;max-width:200px">${esc(v||"")}</span>
      </div>`).join("")}
    </div>`;
  });
  document.getElementById("cli-body").innerHTML=html;
  document.getElementById("cli-ov").style.display="flex";
}
function closeCli(){document.getElementById("cli-ov").style.display="none";}

// ELIMINA
function askDelete(id, nome) {
  pendingDeleteId=id;
  document.getElementById("confirm-txt").textContent=`Eliminare la riga di ${nome}?`;
  document.getElementById("confirm-box").style.display="flex";
}
function cancelDelete(){document.getElementById("confirm-box").style.display="none";pendingDeleteId=null;}
async function confirmDelete(){
  document.getElementById("confirm-box").style.display="none";
  if(!pendingDeleteId)return;
  try{
    const url = SCRIPT_URL + "?action=delete&row=" + pendingDeleteId;
    callScript(url);
    showToast("✅ Riga eliminata");
    setTimeout(()=>doRefresh(),1500);
  }catch(e){showToast("❌ Errore eliminazione");}
  pendingDeleteId=null;
  closeCli();
}

// MODIFICA
const COL_MAP = {contraente:1,ramo:2,polizza:3,scad:4,todo:5,importo:6,rinn:7,fr:8,settore:9,stato:10,targa:11,settori:12,nota1:13,nota2:14,capo:15,rami:16,indirizzo:17,citta:18,cell:19,email:20,tipolCli:21,sub:22,cf:23};
const CAMPI_EDIT = [
  {key:"contraente",label:"Contraente",type:"text"},
  {key:"ramo",label:"Ramo (cod.)",type:"text"},
  {key:"polizza",label:"N° Polizza",type:"text"},
  {key:"scad",label:"SCAD",type:"text",ph:"GG/MM/AAAA"},
  {key:"todo",label:"TO-DO",type:"text",ph:"GG/MM/AAAA"},
  {key:"importo",label:"Importo (€)",type:"number"},
  {key:"rinn",label:"Rinnovo",type:"select",opts:["","S","N"]},
  {key:"fr",label:"FR",type:"text"},
  {key:"settore",label:"Settore",type:"select",opts:SETTORI},
  {key:"stato",label:"Stato",type:"select",opts:STATI},
  {key:"targa",label:"Targa",type:"text"},
  {key:"settori",label:"Settori",type:"text"},
  {key:"nota1",label:"Nota 1",type:"textarea"},
  {key:"nota2",label:"Nota 2",type:"textarea"},
  {key:"capo",label:"Capo",type:"text"},
  {key:"rami",label:"Rami",type:"text"},
  {key:"indirizzo",label:"Indirizzo",type:"text"},
  {key:"citta",label:"Città",type:"text"},
  {key:"cell",label:"Cellulare",type:"text"},
  {key:"email",label:"Email",type:"text"},
  {key:"tipolCli",label:"Tipol. Cli",type:"text"},
  {key:"sub",label:"Sub",type:"text"},
  {key:"cf",label:"CF/Conv",type:"text"},
];
let curEditId = null;

function openEdit(id) {
  const r = records.find(x=>x.id===id); if(!r) return;
  curEditId = id;
  document.getElementById("edit-title").textContent = r.contraente;
  const stl = "width:100%;background:rgba(20,32,60,.9);border:1px solid rgba(59,130,246,.3);border-radius:7px;padding:8px 10px;color:#f1f5f9;font-size:13px;outline:none;font-family:inherit";
  let html = `<div style="font-size:10px;color:#6ee7b7;padding:7px 9px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:7px;margin-bottom:12px">✅ Modifiche salvate direttamente su Google Sheets</div>`;
  html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">`;
  CAMPI_EDIT.forEach(({key,label,type,opts,ph})=>{
    const val = String(r[key]||"");
    const isWide = type==="textarea";
    html += `<div style="${isWide?"grid-column:1/-1;":""} margin-bottom:4px">`;
    html += `<label style="font-size:8px;color:#64748b;text-transform:uppercase;letter-spacing:.07em;font-weight:700;display:block;margin-bottom:3px">${label}</label>`;
    if(type==="select") html+=`<select style="${stl}" id="ef-${key}"><option value=""></option>${opts.map(o=>`<option value="${esc(o)}"${o===val?" selected":""}>${esc(o)||"—"}</option>`).join("")}</select>`;
    else if(type==="textarea") html+=`<textarea style="${stl};resize:vertical;min-height:56px" id="ef-${key}">${esc(val)}</textarea>`;
    else if(type==="number") html+=`<input type="number" step="0.01" style="${stl}" id="ef-${key}" value="${val}">`;
    else html+=`<input type="text" style="${stl}" id="ef-${key}" value="${esc(val)}" placeholder="${ph||""}">`;
    html += "</div>";
  });
  html += "</div>";
  document.getElementById("edit-body").innerHTML = html;
  document.getElementById("edit-ov").style.display = "flex";
}

function closeEdit() { document.getElementById("edit-ov").style.display="none"; curEditId=null; }

async function saveEdit() {
  const r = records.find(x=>x.id===curEditId); if(!r) return;
  const campi = {};
  CAMPI_EDIT.forEach(({key})=>{
    const el = document.getElementById("ef-"+key); if(!el) return;
    const nv = el.value.trim(), ov = String(r[key]||"").trim();
    if(nv!==ov && COL_MAP[key]) campi[COL_MAP[key]] = nv;
  });
  if(Object.keys(campi).length===0){showToast("Nessuna modifica");closeEdit();return;}
  const rowId = curEditId;
  closeEdit(); closeCli();
  showToast("💾 Salvataggio…");
  const campiStr = encodeURIComponent(JSON.stringify(campi));
  const url = SCRIPT_URL + "?action=edit&row=" + rowId + "&campi=" + campiStr;
  callScript(url);
  showToast("✅ Salvato!");
  setTimeout(()=>doRefresh(),2000);
}

// Chiama lo script tramite iframe invisibile — bypassa CORS e redirect
function callScript(url) {
  let iframe = document.getElementById("script-iframe");
  if(!iframe) {
    iframe = document.createElement("iframe");
    iframe.id = "script-iframe";
    iframe.style.display = "none";
    document.body.appendChild(iframe);
  }
  iframe.src = url;
}

let toastT;
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.style.display="block";
  t.style.background=msg.includes("❌")?"#7f1d1d":"#065f46";
  t.style.border=msg.includes("❌")?"1px solid #ef4444":"1px solid #10b981";
  clearTimeout(toastT);toastT=setTimeout(()=>t.style.display="none",3000);
}

loadData();
</script>
